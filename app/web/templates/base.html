<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reMarkable Sync{% block title_suffix %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #090c12;
      --surface:    #11151d;
      --elevated:   #181d27;
      --border:     #1b2230;
      --border-2:   #232a36;
      --accent:     #2f6bff;
      --accent-dim: rgba(47,107,255,0.12);
      --accent-glow:rgba(47,107,255,0.32);
      --text:       #e6e9ef;
      --muted:      #5b6573;
      --muted-2:    #9aa4b2;
      --green:      #34d399;
      --red:        #ff8a80;
      --yellow:     #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Subtle radial glow behind content */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(620px 320px at 50% 0%, rgba(47,107,255,0.10), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout */
    .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* Sidebar */
    nav {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 0;
      display: flex;
      flex-direction: column;
    }

    .nav-brand {
      padding: 0 22px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .nav-brand-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .nav-brand-title span { color: var(--accent); }
    .nav-brand-sub {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 22px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      border-left: 2px solid transparent;
      transition: color 0.15s, background 0.15s;
    }
    nav a:hover { color: var(--text); text-decoration: none; background: rgba(255,255,255,.03); }
    nav a.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: var(--accent-dim);
    }
    nav a .nav-icon { width: 15px; opacity: 0.7; flex-shrink: 0; }
    nav a.active .nav-icon { opacity: 1; }

    /* Main */
    main {
      flex: 1;
      padding: 36px 44px;
      max-width: 1100px;
    }

    /* Page header */
    .page-header { margin-bottom: 28px; }
    .page-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-sub {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    h2 {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    /* Stat cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; margin-bottom: 32px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--border-2); }
    .card-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .card-value { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 11px 18px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    td { padding: 11px 18px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.015); }
    .empty-row td { color: var(--muted); text-align: center; padding: 32px; }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .badge-green  { background: rgba(52,211,153,.12); color: var(--green);  border: 1px solid rgba(52,211,153,.2); }
    .badge-red    { background: rgba(255,138,128,.12); color: var(--red);   border: 1px solid rgba(255,138,128,.2); }
    .badge-yellow { background: rgba(251,191,36,.12);  color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .badge-grey   { background: rgba(91,101,115,.12);  color: var(--muted-2); border: 1px solid var(--border); }
    .badge-blue   { background: var(--accent-dim);     color: #8fb4ff;        border: 1px solid rgba(47,107,255,.25); }

    /* Status dot */
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    .dot-red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
    .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .dot-grey   { background: var(--muted); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 9px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: box-shadow 0.18s, opacity 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 26px rgba(47,107,255,0.5);
      opacity: 0.95;
      text-decoration: none;
    }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-2);
    }
    .btn-ghost:hover { background: var(--elevated); text-decoration: none; }

    /* Form */
    .form-group { margin-bottom: 22px; }
    label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 7px; color: var(--muted-2); letter-spacing: 0.01em; }
    input[type=number], input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border-2);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 9px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      width: 220px;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,107,255,0.12); }
    .field-hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    .toggle { display: flex; align-items: center; gap: 10px; }
    .toggle label { margin: 0; color: var(--text); font-size: 13px; }
    input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }

    /* Alerts */
    .alert-success {
      background: rgba(52,211,153,.08);
      border: 1px solid rgba(52,211,153,.2);
      color: var(--green);
      padding: 11px 16px;
      border-radius: 9px;
      margin-bottom: 22px;
      font-size: 13px;
    }

    .section { margin-bottom: 32px; }

    /* Divider */
    hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* Mono text */
    .mono {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="layout">
  <nav>
    <div class="nav-brand">
      <div class="nav-brand-title">re<span>Sync</span></div>
      <div class="nav-brand-sub">reMarkable → Obsidian</div>
    </div>
    <a href="/" class="{{ 'active' if active_page == 'dashboard' }}">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/>
      </svg>
      Dashboard
    </a>
    <a href="/logs" class="{{ 'active' if active_page == 'logs' }}">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4h12M2 8h8M2 12h10"/>
      </svg>
      Sync Logs
    </a>
    <a href="/documents" class="{{ 'active' if active_page == 'documents' }}">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 1H3a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6L9 1z"/><path d="M9 1v5h5"/>
      </svg>
      Documents
    </a>
    <a href="/settings" class="{{ 'active' if active_page == 'settings' }}">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/>
      </svg>
      Settings
    </a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
