<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reMarkable Sync{% block title_suffix %}{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #6c8cf5;
      --text:     #e2e4ec;
      --muted:    #6b7280;
      --green:    #34d399;
      --red:      #f87171;
      --yellow:   #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }

    nav {
      width: 200px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 0;
      display: flex;
      flex-direction: column;
    }

    .nav-brand {
      padding: 0 20px 24px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .nav-brand span { color: var(--accent); }

    nav a {
      display: block;
      padding: 9px 20px;
      color: var(--muted);
      font-size: 13px;
      border-left: 3px solid transparent;
    }
    nav a:hover { color: var(--text); text-decoration: none; background: rgba(255,255,255,.03); }
    nav a.active { color: var(--text); border-left-color: var(--accent); background: rgba(108,140,245,.08); }

    main {
      flex: 1;
      padding: 32px 40px;
      max-width: 1100px;
    }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .card-value { font-size: 28px; font-weight: 600; }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Table */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-green  { background: rgba(52,211,153,.15); color: var(--green); }
    .badge-red    { background: rgba(248,113,113,.15); color: var(--red); }
    .badge-yellow { background: rgba(251,191,36,.15);  color: var(--yellow); }
    .badge-grey   { background: rgba(107,114,128,.15); color: var(--muted); }

    /* Health dot */
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot-green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-red    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .dot-yellow { background: var(--yellow);box-shadow: 0 0 6px var(--yellow); }
    .dot-grey   { background: var(--muted); }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; text-decoration: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* Form */
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--muted); }
    input[type=number], input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      width: 200px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .toggle { display: flex; align-items: center; gap: 10px; }
    input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }

    .alert-success {
      background: rgba(52,211,153,.1);
      border: 1px solid rgba(52,211,153,.3);
      color: var(--green);
      padding: 10px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .section { margin-bottom: 32px; }
  </style>
</head>
<body>
<div class="layout">
  <nav>
    <div class="nav-brand">re<span>Sync</span></div>
    <a href="/" class="{{ 'active' if active_page == 'dashboard' }}">Dashboard</a>
    <a href="/logs" class="{{ 'active' if active_page == 'logs' }}">Sync Logs</a>
    <a href="/documents" class="{{ 'active' if active_page == 'documents' }}">Documents</a>
    <a href="/settings" class="{{ 'active' if active_page == 'settings' }}">Settings</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
